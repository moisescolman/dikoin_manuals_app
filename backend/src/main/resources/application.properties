spring.application.name=dikoin-manuals-backend
server.port=8080

spring.datasource.url=jdbc:mariadb://localhost:3306/dikoin_manuales?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=120MB

manuals.storage.base-path=./storage
manuals.storage.max-document-size-mb=100
manuals.storage.max-image-size-mb=20
manuals.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
manuals.export.frontend-print-base-url=http://localhost:5173
# manuals.export.chrome-path=C:\\Program Files (x86)\\Google\\Chrome\\Application\\chrome.exe

gemini.api.key=api-key goes here
gemini.model=gemini-2.5-flash
gemini.enabled=true
